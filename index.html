<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnugStep - Handmade Footwear</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f6f1ea;
    color: #333;
}

header {
    background: #1a1a1a;
    color: white;
    text-align: center;
    padding: 60px 20px;
}

header h1 {
    margin: 0;
    font-size: 40px;
}

header p {
    opacity: 0.8;
}

section {
    padding: 40px 20px;
}

h2 {
    text-align: center;
    margin-bottom: 30px;
}

.products {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    background: white;
    width: 300px;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.sizes button {
    margin: 5px;
    padding: 8px 12px;
    border: 1px solid #ccc;
    background: white;
    cursor: pointer;
}

.shop {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    background: #c2a77a;
    color: white;
    cursor: pointer;
    border-radius: 8px;
}
</style>
</head>

<body>

<header>
    <h1>SnugStep</h1>
    <p>Handcrafted Comfort. Timeless Style.</p>
</header>

<section>
    <h2>Our Products</h2>

    <div class="products">

        <div class="card">
            <img src="birken_clog_cropped.png">
            <h3>Clogs</h3>

            <div class="sizes">
                <button onclick="selectSize(this)">37</button>
                <button onclick="selectSize(this)">38</button>
                <button onclick="selectSize(this)">39</button>
            </div>

            <button class="shop">Shop Now</button>
        </div>

        <div class="card">
            <img src="premium_sandals_cropped.png">
            <h3>Sandals</h3>

            <div class="sizes">
                <button onclick="selectSize(this)">37</button>
                <button onclick="selectSize(this)">38</button>
                <button onclick="selectSize(this)">39</button>
            </div>

            <button class="shop">Shop Now</button>
        </div>

    </div>
</section>

<script>
function selectSize(btn) {
    let siblings = btn.parentElement.querySelectorAll("button");
    siblings.forEach(b => b.style.background = "white");
    btn.style.background = "#c2a77a";
}
</script>

</body>
</html>
